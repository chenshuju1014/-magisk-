name: Build Zygisk FakeTime

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          unzip ZygiskFakeTimeModule_source.zip
          ls -la
          ls -la ZygiskFakeTimeModule

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;26.3.11579264"

      - name: Build native libraries
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264
          cd ZygiskFakeTimeModule/module/jni
          $ANDROID_NDK_HOME/ndk-build

      - name: Pack Magisk module
        run: |
          cd ZygiskFakeTimeModule
          mkdir -p module/zygisk
          cp module/libs/arm64-v8a/libzygisk_faketime.so module/zygisk/arm64-v8a.so
          cp module/libs/armeabi-v7a/libzygisk_faketime.so module/zygisk/armeabi-v7a.so
          rm -rf module/libs module/obj
          cd module
          zip -r ../../zygisk_faketime.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk_faketime
          path: zygisk_faketime.zip
